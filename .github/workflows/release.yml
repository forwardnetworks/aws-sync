name: release
permissions:
  contents: write
  id-token: write
  attestations: write

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Check formatting
        run: test -z "$(gofmt -l ./cmd ./internal)"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath -o "dist/awssync-${GOOS}-${GOARCH}" ./cmd/awssync
      - uses: actions/upload-artifact@v7
        with:
          name: awssync-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/awssync-${{ matrix.goos }}-${{ matrix.goarch }}

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v7
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Collect release assets
        run: |
          for file in dist/awssync-*; do
            [ -f "$file" ] || continue
            [ -x "$file" ] || chmod +x "$file"
          done
          rm -f dist/sha256sums.txt
          for file in dist/awssync-*; do
            [ -f "$file" ] || continue
            tar -czf "${file}.tar.gz" -C dist "$(basename "$file")"
          done
          (
            cd dist
            sha256sum awssync-* > sha256sums.txt
          )
      - name: Verify artifacts are executable and checksums match
        run: |
          for file in \
            dist/awssync-linux-amd64 \
            dist/awssync-linux-arm64 \
            dist/awssync-darwin-amd64 \
            dist/awssync-darwin-arm64; do
            [ -f "$file" ] || continue
            if [ ! -x "$file" ]; then
              echo "Release artifact missing execute bit: $file" >&2
              exit 1
            fi
          done
          (
            cd dist
            sha256sum -c sha256sums.txt
          )
      - name: Generate build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/awssync-linux-amd64
            dist/awssync-linux-arm64
            dist/awssync-darwin-amd64
            dist/awssync-darwin-arm64
            dist/awssync-linux-amd64.tar.gz
            dist/awssync-linux-arm64.tar.gz
            dist/awssync-darwin-amd64.tar.gz
            dist/awssync-darwin-arm64.tar.gz
      - name: Render release notes
        run: |
          sed "s|{{VERSION}}|${{ github.ref_name }}|g" .github/RELEASE_NOTES_TEMPLATE.md > dist/release-notes.md
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: dist/release-notes.md
          files: |
            dist/awssync-*
            dist/sha256sums.txt
