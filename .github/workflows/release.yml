name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Check formatting
        run: make fmt-check
      - name: Vet
        run: make vet
      - name: Test
        run: make test
      - name: Race detector
        run: make race
      - name: Vulnerability scan
        run: make vuln

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          BUILD_DATE="$(git show -s --format=%cI "$GITHUB_SHA")"
          make build \
            BINARY="dist/awssync-${GOOS}-${GOARCH}" \
            VERSION="${VERSION}" \
            COMMIT="${COMMIT}" \
            BUILD_DATE="${BUILD_DATE}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: awssync-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/awssync-${{ matrix.goos }}-${{ matrix.goarch }}

  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist
          merge-multiple: true
      - name: Collect release assets
        run: |
          for file in dist/awssync-*; do
            [ -f "$file" ] || continue
            [ -x "$file" ] || chmod +x "$file"
          done
          rm -f dist/sha256sums.txt
          for file in dist/awssync-*; do
            [ -f "$file" ] || continue
            tar -czf "${file}.tar.gz" -C dist "$(basename "$file")"
          done
          (
            cd dist
            sha256sum awssync-* > sha256sums.txt
          )
      - name: Verify artifacts are executable and checksums match
        run: |
          for file in \
            dist/awssync-linux-amd64 \
            dist/awssync-linux-arm64 \
            dist/awssync-darwin-amd64 \
            dist/awssync-darwin-arm64; do
            [ -f "$file" ] || continue
            if [ ! -x "$file" ]; then
              echo "Release artifact missing execute bit: $file" >&2
              exit 1
            fi
          done
          (
            cd dist
            sha256sum -c sha256sums.txt
          )
      - name: Generate build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: |
            dist/awssync-linux-amd64
            dist/awssync-linux-arm64
            dist/awssync-darwin-amd64
            dist/awssync-darwin-arm64
            dist/awssync-linux-amd64.tar.gz
            dist/awssync-linux-arm64.tar.gz
            dist/awssync-darwin-amd64.tar.gz
            dist/awssync-darwin-arm64.tar.gz
      - name: Render release notes
        run: |
          sed "s|{{VERSION}}|${{ github.ref_name }}|g" .github/RELEASE_NOTES_TEMPLATE.md > dist/release-notes.md
      - name: Publish GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: dist/release-notes.md
          files: |
            dist/awssync-*
            dist/sha256sums.txt
